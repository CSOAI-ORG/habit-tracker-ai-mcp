name: habit-tracker-ai-mcp
description: 'Habit Tracker Ai MCP server. Tools: create habit, log completion, get
  habit streak. Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: create_habit
  description: Create new habit
  parameters:
  - name: name
    type: string
    required: true
  - name: frequency
    type: string
    required: false
  - name: reminder_time
    type: string
    required: false
- name: log_completion
  description: Log habit completion
  parameters:
  - name: habit_id
    type: string
    required: true
  - name: date
    type: string
    required: false
  - name: notes
    type: string
    required: false
- name: get_habit_streak
  description: Get current streak
  parameters:
  - name: habit_id
    type: string
    required: true
- name: get_habit_history
  description: Get habit history
  parameters:
  - name: habit_id
    type: string
    required: true
  - name: days
    type: integer
    required: false
- name: get_all_habits
  description: Get all habits
  parameters: []
- name: delete_habit
  description: Delete habit
  parameters:
  - name: habit_id
    type: string
    required: true
- name: get_weekly_stats
  description: Get weekly stats
  parameters: []
